<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    padding: 28px 24px;
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    color: #0f172a;
    background-image:
      linear-gradient(160deg, rgba(15, 23, 42, .28), rgba(30, 41, 59, .2));
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
  }
  .help-root {
    width: 920px;
    margin: 0 auto;
    position: relative;
  }
  .card {
    position: relative;
    width: 100%;
    background: rgba(255, 255, 255, 0);
    border: 1px solid rgba(255, 255, 255, .6);
    /* box-shadow: 0 20px 50px rgba(30, 41, 59, .18); */
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(120deg, rgba(99, 102, 241, .08), rgba(56, 189, 248, .05)),
      url("https://t.alcy.cc/mp");
    background-size: cover;
    opacity: 1;
    background-position: center;
    pointer-events: none;
  }
  .header {
    position: relative;
    padding: 32px 30px 24px;
    color: #fff;
    background: #2faffa63;
  }
  .title {
    margin: 0;
    font-size: 42px;
    font-weight: 800;
    letter-spacing: 1px;
    text-shadow: 0 2px 10px rgba(0, 0, 0, .22);
  }
  .sub {
    margin-top: 12px;
    font-size: 19px;
    opacity: .95;
  }
  .badge {
    display: inline-block;
    margin-top: 14px;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 700;
    background: rgba(255, 255, 255, .22);
    border: 1px solid rgba(255, 255, 255, .35);
  }
  .table-wrap {
    position: relative;
    padding: 20px 20px 26px;
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    table-layout: fixed;
    background: rgba(255, 255, 255, .86);
    opacity: 0.99;
    overflow: hidden;
    box-shadow: inset 0 0 0 1px rgba(99, 102, 241, .1);
  }
  th {
    text-align: left;
    background: linear-gradient(180deg, #eef2ff, #e0e7ff);
    color: #312e81;
    font-weight: 800;
    padding: 14px 12px;
    border-bottom: 1px solid #dbeafe;
    font-size: 17px;
  }
  td {
    padding: 14px 12px;
    border-bottom: 1px solid rgba(226, 232, 240, .8);
    vertical-align: top;
    word-break: break-word;
    line-height: 1.6;
    font-size: 17px;
    color: #0f172a;
  }
  tr:nth-child(even) td { background: rgba(248, 250, 252, .78); }
  tr:last-child td { border-bottom: none; }
  .idx { width: 68px; text-align: center; font-weight: 700; color: #4338ca; }
  .cmd { width: 210px; font-weight: 700; color: #1d4ed8; }
  .desc { width: 300px; color: #0f172a; }
  .ex { width: 340px; color: #334155; }
  
</style>
</head>
<body>
  <div class="help-root">
    <div class="card">
      <div class="header">
        <h1 class="title">机器人帮助菜单</h1>
        <div class="sub">共 {{len .}} 条指令 · 快速查阅使用说明</div>
        <div class="badge">LaoinBot Command Guide</div>
      </div>
        <table>
          <thead>
            <tr>
              <th class="idx">#</th>
              <th class="cmd">指令</th>
              <th class="desc">说明</th>
              <th class="ex">示例</th>
            </tr>
          </thead>
          <tbody>
            {{range .}}
            <tr>
              <td class="idx">{{.Index}}</td>
              <td class="cmd">{{.Order}}</td>
              <td class="desc">{{.Explain}}</td>
              <td class="ex">{{.Example}}</td>
            </tr>
            {{end}}
          </tbody>
        </table>
    </div>
  </div>
</body>
</html>
